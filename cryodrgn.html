<script>
    function updateViewportHeight() {
        document.documentElement.style.setProperty("--app-height", `${window.innerHeight}px`);
    }

    function getView() {
        const params = new URLSearchParams(window.location.search);
        const view = params.get("view");
        return ["overview", "atp", "mt-atp", "occupancy"].includes(view) ? view : "overview";
    }

    function activateView(view) {
        const panels = Array.from(document.querySelectorAll("[data-view-panel]"));
        const links = Array.from(document.querySelectorAll("[data-view-link]"));

        panels.forEach(panel => {
            const shouldShow = panel.dataset.viewPanel === view;
            panel.hidden = !shouldShow;

            const video = panel.querySelector("video");
            const source = panel.querySelector("source[data-src]");

            if (video && source) {
                if (shouldShow) {
                    if (!video.getAttribute("src") && source.dataset.src) {
                        video.setAttribute("src", source.dataset.src);
                    }
                    if (!video.querySelector("source[src]") && source.dataset.src) {
                        source.setAttribute("src", source.dataset.src);
                    }
                    video.load();
                } else {
                    video.pause();
                    video.removeAttribute("src");
                    source.removeAttribute("src");
                    video.load();
                }
            }
        });

        links.forEach(link => {
            const isActive = link.dataset.viewLink === view;
            link.classList.toggle("is-active", isActive);
            if (isActive) {
                link.setAttribute("aria-current", "page");
            } else {
                link.removeAttribute("aria-current");
            }
        });

        window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
    }

    document.querySelectorAll("video[data-click-to-play]").forEach((video) => {
        video.addEventListener("click", (event) => {
            if (event.target !== video) return;
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        });
    });

    updateViewportHeight();
    activateView(getView());

    window.addEventListener("resize", () => {
        updateViewportHeight();
    });

    window.addEventListener("orientationchange", () => {
        updateViewportHeight();
    });
</script>
